# Hardened, reusable Docker build-and-push workflow (GHCR).
# Call it from a consumer repo:
#
#   jobs:
#     image:
#       uses: abhisheksawant52/github-actions-enterprise-templates/.github/workflows/reusable-docker-build-push.yml@main
#       with:
#         image-name: ${{ github.repository }}
#         push: ${{ github.ref == 'refs/heads/main' }}
#       secrets:
#         registry-token: ${{ secrets.GITHUB_TOKEN }}
name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: Image name without registry prefix (e.g. owner/app).
        type: string
        required: true
      registry:
        description: Container registry host.
        type: string
        default: ghcr.io
      context:
        description: Docker build context path.
        type: string
        default: "."
      dockerfile:
        description: Path to the Dockerfile.
        type: string
        default: Dockerfile
      push:
        description: Whether to push the built image.
        type: boolean
        default: false
      platforms:
        description: Comma-separated target platforms.
        type: string
        default: linux/amd64
    secrets:
      registry-token:
        description: Token used to authenticate to the registry.
        required: true
    outputs:
      image-digest:
        description: The digest of the built image.
        value: ${{ jobs.build.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.registry-token }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=long
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
