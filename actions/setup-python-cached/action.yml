name: Setup Python (cached)
description: >-
  Install a Python version and restore a pip cache keyed on the project's
  dependency manifests, then optionally install the project.

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: "3.12"
  install:
    description: Whether to run `pip install` for the project.
    required: false
    default: "true"
  install-args:
    description: Arguments passed to pip install when install is true.
    required: false
    default: "-e .[dev]"

outputs:
  python-version:
    description: The resolved Python version.
    value: ${{ steps.setup.outputs.python-version }}

runs:
  using: composite
  steps:
    - name: Set up Python
      id: setup
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
    - name: Install project
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install ${{ inputs.install-args }}
